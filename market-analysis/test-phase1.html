<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 1 API Test - Crypto Market Analysis</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Include main styles from index.html (simplified) -->
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --bg-elevated: #ffffff;
            --bg-dark: #1e293b;
            
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #64748b;
            --text-inverse: #ffffff;
            
            --primary: #2563eb;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --info: #0891b2;
            
            --success-subtle: #ecfdf5;
            --danger-subtle: #fef2f2;
            --warning-subtle: #fffbeb;
            --info-subtle: #ecfeff;
            
            --border-light: #e2e8f0;
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            
            --space-sm: 0.75rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
        }
        
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }
        
        .card {
            background: var(--bg-elevated);
            border: none;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-card);
            margin-bottom: var(--space-lg);
        }
        
        .trend-up { color: var(--success) !important; }
        .trend-down { color: var(--danger) !important; }
        .trend-neutral { color: var(--text-secondary) !important; }
    </style>
    
    <!-- Phase 1 Enhancement Styles -->
    <link rel="stylesheet" href="styles/phase1-enhancements.css">
</head>
<body>
    <div class="container py-4">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="h3 mb-3">Phase 1: API Integration Test</h1>
                <div class="d-flex align-items-center gap-3">
                    <span id="data-status" class="status-loading">🔄 Loading...</span>
                    <button class="refresh-btn" onclick="window.testEngine.fetchLiveMarketData()">
                        <i class="fas fa-sync-alt"></i> Refresh Data
                    </button>
                    <button class="btn btn-sm btn-secondary" onclick="showCacheStatus()">
                        <i class="fas fa-database"></i> Cache Status
                    </button>
                </div>
            </div>
        </div>

        <!-- Test API Data Display -->
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Bitcoin <span class="api-source live">LIVE</span></h5>
                        <h3 class="mb-1">$<span data-bind="text:marketOverview.bitcoin.price">0</span></h3>
                        <p class="mb-0">
                            <i id="btc-trend-icon" class="fas fa-arrow-right"></i>
                            <span data-bind="text:marketOverview.bitcoin.change" class="trend-neutral">0.0%</span>
                        </p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Ethereum <span class="api-source live">LIVE</span></h5>
                        <h3 class="mb-1">$<span data-bind="text:marketOverview.ethereum.price">0</span></h3>
                        <p class="mb-0">
                            <i id="eth-trend-icon" class="fas fa-arrow-right"></i>
                            <span data-bind="text:marketOverview.ethereum.change" class="trend-neutral">0.0%</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h6 class="card-title">Total Market Cap</h6>
                        <h4 data-bind="text:marketOverview.totalMarketCap.value">$0.00T</h4>
                        <small data-bind="text:marketOverview.totalMarketCap.change">0.0%</small>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h6 class="card-title">BTC Dominance</h6>
                        <h4><span data-bind="text:marketOverview.bitcoinDominance.percentage">0</span>%</h4>
                        <small data-bind="text:marketOverview.bitcoinDominance.change">0.0%</small>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h6 class="card-title">Fear & Greed Index</h6>
                        <h4 data-bind="text:sentimentData.fearGreedIndex.value">50</h4>
                        <small data-bind="text:sentimentData.fearGreedIndex.label">Neutral</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- API Test Results -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">API Test Results</h5>
                    </div>
                    <div class="card-body">
                        <div id="test-results">
                            <p class="text-muted">Waiting for API responses...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Display -->
        <div id="error-container" class="mt-3"></div>
    </div>

    <!-- Cache Status Modal -->
    <div class="cache-status" id="cache-status">
        <h6>Cache Status</h6>
        <div id="cache-details"></div>
    </div>

    <!-- Include the enhanced data engine -->
    <script src="data_engine_enhanced.js"></script>
    
    <!-- Test Script -->
    <script>
        // Initialize test engine
        let testEngine;
        
        document.addEventListener('DOMContentLoaded', function() {
            // Override the engine for testing
            window.testEngine = window.cryptoEngine;
            testEngine = window.cryptoEngine;
            
            // Log test results
            logTestResults();
            
            // Set up auto-refresh every 30 seconds for demo
            setInterval(() => {
                if (!document.querySelector('.refresh-btn').classList.contains('refreshing')) {
                    testEngine.fetchLiveMarketData();
                }
            }, 30000);
        });
        
        function logTestResults() {
            const resultsDiv = document.getElementById('test-results');
            let html = '<h6>Phase 1 Implementation Status:</h6><ul>';
            
            // Check implementation status
            const checks = [
                { name: 'CoinGecko API Integration', status: testEngine.apiConfig.apis.coinGecko ? '✅' : '❌' },
                { name: 'Alternative.me API Integration', status: testEngine.apiConfig.apis.alternativeMe ? '✅' : '❌' },
                { name: 'LocalStorage Cache', status: testEngine.cache ? '✅' : '❌' },
                { name: 'Retry Logic', status: testEngine.fetchWithRetry ? '✅' : '❌' },
                { name: 'CORS Proxy Support', status: testEngine.apiConfig.corsProxies ? '✅' : '❌' },
                { name: 'Data Source Tracking', status: testEngine.dataSourceMap ? '✅' : '❌' },
                { name: 'Auto-refresh System', status: testEngine.startAutoRefresh ? '✅' : '❌' },
                { name: 'Fallback System', status: testEngine.handleInitError ? '✅' : '❌' }
            ];
            
            checks.forEach(check => {
                html += `<li>${check.status} ${check.name}</li>`;
            });
            
            html += '</ul>';
            
            // Add cache stats
            if (testEngine.cache) {
                const stats = testEngine.cache.getStats();
                html += `<h6 class="mt-3">Cache Statistics:</h6>`;
                html += `<p>Entries: ${stats.entries}<br>`;
                html += `Size: ${stats.sizeKB} KB<br>`;
                html += `Keys: ${stats.keys.join(', ') || 'None'}</p>`;
            }
            
            resultsDiv.innerHTML = html;
        }
        
        function showCacheStatus() {
            const cacheStatus = document.getElementById('cache-status');
            const cacheDetails = document.getElementById('cache-details');
            
            if (testEngine.cache) {
                const stats = testEngine.cache.getStats();
                let html = '';
                
                stats.keys.forEach(key => {
                    const data = localStorage.getItem('crypto_cache_' + key);
                    if (data) {
                        const parsed = JSON.parse(data);
                        const age = Math.round((Date.now() - parsed.timestamp) / 1000);
                        html += `<div class="cache-item">
                            <span>${key}</span>
                            <span class="age">${age}s ago</span>
                        </div>`;
                    }
                });
                
                cacheDetails.innerHTML = html || '<p class="text-muted">Cache is empty</p>';
                cacheStatus.classList.add('visible');
                
                setTimeout(() => {
                    cacheStatus.classList.remove('visible');
                }, 5000);
            }
        }
        
        // Override fetch to log API calls
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
            console.log('🌐 API Call:', args[0]);
            return originalFetch.apply(this, args)
                .then(response => {
                    console.log('✅ API Response:', response.status, args[0]);
                    return response;
                })
                .catch(error => {
                    console.error('❌ API Error:', error, args[0]);
                    throw error;
                });
        };
    </script>
</body>
</html>
